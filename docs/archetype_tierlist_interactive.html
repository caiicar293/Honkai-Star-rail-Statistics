            padding: 20px;
        }

            text-align: center;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 5px; /* Reduced to pull subtitle closer */
        }
        
        /* New Header Subtitle Styling */
        .list-subtitle {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 25px;
            font-style: italic;
        }

        .meta-badge {
            font-size: 0.45em;
            color: #38bdf8;
            border: 1px solid #38bdf8;
            padding: 3px 8px;
            border-radius: 4px;
            vertical-align: middle;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(56, 189, 248, 0.1);
        }
        .version-text {
            font-size: 0.45em;
            color: #888;
            font-weight: normal;
        }
        
        /* New Tab Container Controls Layout */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }
        .tab-row-container {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }
        .tab-label {
            font-size: 14px;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-width: 130px;
            text-align: right;
        }
        .tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            background-color: #2b2b2b;
            color: #aaa;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab:hover {
            background-color: #383838;
            color: #fff;
            border-color: #666;
        }
        .tab.active {
            background-color: #38bdf8;
            color: #000;
            border-color: #38bdf8;
            font-weight: bold;
        }

        .tier-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-width: 1100px;
            margin: 0 auto;
            background-color: #000;
            border: 2px solid #333;
        }
        .tier-row {
            display: flex;
            min-height: 80px;
            border-bottom: 1px solid #333;
        }
        .tier-row:last-child {
            border-bottom: none;
        }
        .tier-label {
            width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: #000;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.3);
            flex-shrink: 0;
        }
        /* Tier Colors */
        .tier-T0 { background-color: #ff7f7f; }
        .tier-T0\.5 { background-color: #ffbf7f; }
        .tier-T1 { background-color: #ffff7f; }
        .tier-T1\.5 { background-color: #bfff7f; }
        .tier-T2 { background-color: #7fff7f; }

        .tier-content {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 15px;
            background-color: #222;
            flex-grow: 1;
            align-items: center;
        }
        
        .archetype-wrapper {
            display: flex;
            flex-direction: column;
            background-color: #333;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #444;
            align-items: center;
            gap: 6px;
        }
        .archetype-score {
            font-size: 12px;
            font-weight: bold;
            color: #ccc;
            background-color: #1a1a1a;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid #444;
        }
        .archetype-group {
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }
        .char-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 65px; 
        }
        .char-container img {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            background-color: #111;
            object-fit: cover;
            border: 1px solid #555;
        }
        .char-name {
            font-size: 10px;
            color: #aaa;
            text-align: center;
            margin-top: 5px;
            line-height: 1.2;
            word-break: break-word;
        }
        .missing-icon {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #444;
            color: #888;
            font-size: 20px;
            border-radius: 4px;
            border: 1px solid #555;
        }
        .plus {
            color: #666;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px; 
        }

        /* New Footer Disclaimer Styling */
        .list-footer {
            max-width: 1100px;
            margin: 15px auto 0 auto;
            font-size: 12px;
            color: #777;
            text-align: left;
            padding-left: 5px;
        }
    </style>
</head>

        function parseCsv(rawCsv) {
            const trimmed = rawCsv.trim();
            if (!trimmed) return [];
            return trimmed.split('\n').slice(1).map(row => {
                const [Game_Mode, Archetype_Core, Weighted_Avg_Score, Tier] = row.split(',');
                return { Game_Mode, Archetype_Core, Weighted_Avg_Score, Tier };
            });
        }

        const sectionData = {
            ARCHETYPES: parseCsv(rawCsvDataArchetypes),
            AMPLIFIERS: parseCsv(rawCsvDataAmplifiers),
            SUSTAINS: parseCsv(rawCsvDataSustains)
        };

        const tiers = ['T0', 'T0.5', 'T1', 'T1.5', 'T2'];

        // Core tab switching helper
        function selectTab(containerId, tabElement) {
            const container = document.getElementById(containerId);
            container.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            tabElement.classList.add('active');
            renderTierList();
        }

        function renderTierList() {
            const selectedSection = document.querySelector('#sectionTabs .tab.active').getAttribute('data-value');
            const selectedMode = document.querySelector('#modeTabs .tab.active').getAttribute('data-value');
            
            const container = document.getElementById('tierListContainer');
            container.innerHTML = ''; 

            const parsedData = sectionData[selectedSection];

            if (!parsedData || parsedData.length === 0 || !parsedData.some(d => d.Game_Mode === selectedMode)) {
                const emptyMsg = document.createElement('div');
                emptyMsg.style.textAlign = 'center';
                emptyMsg.style.color = '#888';
                emptyMsg.style.padding = '30px';
                emptyMsg.innerText = 'No data available for this section and game mode.';
                container.appendChild(emptyMsg);
                return;
            }

            tiers.forEach(tier => {
                const matchingItems = parsedData.filter(d => d.Game_Mode === selectedMode && d.Tier === tier);

                if (matchingItems.length === 0) return; 

                matchingItems.sort((a, b) => {
                    const scoreA = parseFloat(a.Weighted_Avg_Score);
                    const scoreB = parseFloat(b.Weighted_Avg_Score);
                    
                    if (selectedMode === 'APOC' || selectedMode === 'PURE_FICTION') {
                        return scoreB - scoreA;
                    } else {
                        return scoreA - scoreB;
                    }
                });

                const rowEl = document.createElement('div');
                rowEl.className = 'tier-row';
                
                const tierClass = tier.replace('.', '\\.'); 
                
                const labelEl = document.createElement('div');
                labelEl.className = `tier-label tier-${tierClass}`;
                labelEl.innerText = tier;
                rowEl.appendChild(labelEl);

                const contentEl = document.createElement('div');
                contentEl.className = 'tier-content';

                matchingItems.forEach(item => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'archetype-wrapper';
                    
                    const scoreDiv = document.createElement('div');
                    scoreDiv.className = 'archetype-score';
                    scoreDiv.innerText = `Score: ${item.Weighted_Avg_Score}`;
                    wrapper.appendChild(scoreDiv);

                    const archGroup = document.createElement('div');
                    archGroup.className = 'archetype-group';
                    
                    const characters = item.Archetype_Core.split(' + ').map(s => s.trim());
                    
                    characters.forEach((char, index) => {
                        const charContainer = document.createElement('div');
                        charContainer.className = 'char-container';

                        const iconSrc = iconData[char];
                        if (iconSrc) {
                            const img = document.createElement('img');
                            img.src = iconSrc;
                            img.title = char;
                            charContainer.appendChild(img);
                        } else {
                            const missing = document.createElement('div');
                            missing.className = 'missing-icon';
                            missing.innerText = '?';
                            charContainer.appendChild(missing);
                        }

                        const nameLabel = document.createElement('div');
                        nameLabel.className = 'char-name';
                        nameLabel.innerText = char;
                        charContainer.appendChild(nameLabel);

                        archGroup.appendChild(charContainer);

                        if (index < characters.length - 1) {
                            const plus = document.createElement('span');
                            plus.className = 'plus';
                            plus.innerText = '+';
                            archGroup.appendChild(plus);
                        }
                    });

                    wrapper.appendChild(archGroup);
                    contentEl.appendChild(wrapper);
                });

                rowEl.appendChild(contentEl);
                container.appendChild(rowEl);
            });
        }

        renderTierList();
    </script>
</body>
</html>
